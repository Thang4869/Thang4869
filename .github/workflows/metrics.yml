name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Sử dụng @master thay vì @latest để tránh lỗi 'remaining' của bản v3.34
      - uses: lowlighter/metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Cấu hình hiển thị
          user: Thang4869
          template: classic
          base: "" # Xóa header mặc định để trông gọn hơn
          config_timezone: Asia/Ho_Chi_Minh
          
          # PLUGIN HABITS - Đây là nơi tạo ra RADAR CHART
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: radar # Ép kiểu về mạng nhện
          
          # PLUGIN LANGUAGES (Tùy chọn thêm để bổ trợ dữ liệu)
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
