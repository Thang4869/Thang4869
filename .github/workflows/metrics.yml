name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Sử dụng phiên bản master và ép buộc bỏ qua kiểm tra quota
      - uses: lowlighter/metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Thang4869
          base: ""
          config_timezone: Asia/Ho_Chi_Minh
          
          # PLUGIN HABITS (Radar Chart)
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: radar
          
          # PHẦN QUAN TRỌNG: Khóa các yếu tố gây lỗi 'remaining'
          config_display: columns
          debug: yes
