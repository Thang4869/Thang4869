name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Thang4869
          template: classic
          base: "" # Xóa các phần linh tinh khác để hiện biểu đồ cho đẹp
          config_timezone: Asia/Ho_Chi_Minh
          
          # PLUGIN FOLLOWUP - Đây chính là cái tạo ra Radar Chart bạn muốn
          plugin_followup: yes
          plugin_followup_sections: user
          plugin_followup_indepth: yes # Phân tích sâu để lấy dữ liệu chính xác

          # Tối ưu hóa render
          config_display: columns
          output_action: commit
          committer_ghost: yes
