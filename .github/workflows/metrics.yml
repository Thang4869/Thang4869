name: GitHub Profile Graph
on:
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:
  push: { branches: ["master", "main"] }
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: yoshi389111/github-profile-graph-action@master
        with:
          github_token: ${{ secrets.METRICS_TOKEN }}
          author: Thang4869
          # Cấu hình màu sắc cho tone xanh lá (giống profile bạn)
          color: github
          # Bạn có thể chọn theme: github, github-dark, v.v.
