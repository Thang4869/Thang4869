name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Cấu hình chính
          user: Thang4869
          template: classic
          base: ""
          config_timezone: Asia/Ho_Chi_Minh
          
          # PLUGIN LANGUAGES (Tạo biểu đồ mạng nhện)
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes # Phân tích sâu hơn
          plugin_languages_details: percentage # Hiển thị %
          plugin_languages_categories: markup, programming
          plugin_languages_limit: 8
          
          # KÍCH HOẠT RADAR CHART
          # Chú ý: Plugin này sẽ tạo ra một biểu đồ về thói quen/kỹ năng
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
