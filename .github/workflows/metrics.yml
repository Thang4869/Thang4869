name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Thang4869
          base: "" # TẮT HẾT BASE ĐỂ TRÁNH LỖI QUOTA
          plugin_followup: yes
          plugin_followup_archived: yes
          plugin_followup_sections: user
          # Dòng này ép nó phải vẽ dạng radar
          config_display: columns
